<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Login — LMS Dashboard</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div>
		
	</div>
	<main class="login-page">
		<div class="card">
			<h1 class="logo">LMS Dashboard</h1>
			<form id="loginForm" novalidate>
				<div class="field">
					<label for="email">Email</label>
					<input id="email" name="email" type="email" placeholder="you@example.com" required />
					<div class="error" data-for="email"></div>
				</div>

				<div class="field">
					<label for="password">Password</label>
					<input id="password" name="password" type="password" placeholder="••••••••" required minlength="6" />
					<div class="error" data-for="password"></div>
				</div>

				<div class="row">
					<label class="checkbox"><input id="remember" name="remember" type="checkbox" /> Remember me</label>
					<a class="small" href="#">Forgot?</a>
				</div>

				<button type="submit" class="btn">Sign in</button>
			</form>

			<p class="muted">Don't have an account? <a href="#">Sign up</a></p>
		</div>
	</main>

	<script src="login.js"></script>
</body>
</html>
